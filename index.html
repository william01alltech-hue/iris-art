<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS 的藝術空間 - 旗艦正式版</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #D4AF37; --dark-bg: #1A1A1A; --card-bg: #252525; --cream: #F5F5DC; }
        
        /* 1. 統一標楷體呈現 */
        body, input, textarea, button, h1, h2, h3 {
            font-family: "標楷體", "DFKai-SB", "BiauKai", serif;
            background-color: var(--dark-bg); color: var(--cream);
        }
        body { margin: 0; padding: 0; overflow-x: hidden; }

        nav { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; transition: 0.3s; }
        
        .hero { height: 25vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 5px double var(--gold); background: linear-gradient(135deg, #1a1a1a 25%, #222 25%, #222 50%, #1a1a1a 50%, #1a1a1a 75%, #222 75%, #222 100%); background-size: 40px 40px; }
        .brand-title { font-size: 2rem; color: var(--gold); letter-spacing: 8px; border: 3px solid var(--gold); padding: 10px 20px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--gold); padding: 25px; width: 90%; max-width: 450px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 30px; }
        .product-card { border: 2px solid var(--gold); padding: 20px; background: var(--card-bg); text-align: center; position: relative; }
        .product-card img { width: 100%; height: 280px; object-fit: contain; background: #111; border-bottom: 1px solid var(--gold); margin-bottom: 15px; }

        .btn-action { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 12px 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; text-align: left;}
        .form-group label { color: var(--gold); margin-bottom: 5px; }
        .form-group input { background: #333; border: 1px solid var(--gold); color: white; padding: 10px; }

        #admin-panel { display: none; max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid var(--gold); }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: #721c24; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div style="color:var(--gold); font-weight:bold;">IRIS ART</div>
        <div>
            <button class="btn-nav" onclick="openCart()">🛒 購物車 (<span id="cart-count">0</span>)</button>
            <button class="btn-nav" onclick="toggleAuth()">管理員</button>
        </div>
    </nav>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--gold)">結帳資訊</h2>
            <div class="form-group"><label>收件姓名 *</label><input type="text" id="cust-name"></div>
            <div class="form-group"><label>您的 E-mail *</label><input type="email" id="cust-email"></div>
            <button class="btn-action" onclick="submitOrder()">透過郵件發送訂單</button>
            <button class="btn-nav" style="width:100%; border:none; margin-top:10px;" onclick="closeCart()">返回</button>
        </div>
    </div>

    <section class="hero"><h1 class="brand-title">IRIS 的藝術空間</h1></section>

    <section id="admin-panel">
        <h2 style="text-align:center; color:var(--gold);">藝廊管理</h2>
        <div class="form-group"><label>1. 上傳照片 (自動壓縮)</label><input type="file" id="imageInput" accept="image/*"></div>
        <div class="form-group"><label>2. 品名</label><input type="text" id="nameInput"></div>
        <div class="form-group"><label>3. 價格</label><input type="number" id="priceInput"></div>
        <button id="uploadBtn" class="btn-action" onclick="handleUpload()">確認新增</button>
    </section>

    <main class="product-grid" id="productGrid"></main>

    <script>
        let products = JSON.parse(localStorage.getItem('iris_products')) || [];
        let cart = JSON.parse(localStorage.getItem('iris_cart')) || [];
        let isLoggedIn = sessionStorage.getItem('iris_login') === 'true';

        // --- 核心：專業圖片壓縮技術 ---
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = Math.min(800 / img.width, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // 壓縮品質 0.6
                    };
                };
            });
        }

        async function handleUpload() {
            const name = document.getElementById('nameInput').value;
            const price = document.getElementById('priceInput').value;
            const file = document.getElementById('imageInput').files[0];
            if (!name || !price || !file) return alert('請完整填寫');

            const compressedBase64 = await compressImage(file);
            try {
                products.push({ name, price, image: compressedBase64 });
                localStorage.setItem('iris_products', JSON.stringify(products));
                renderProducts();
                alert('上傳成功！');
            } catch (e) { alert('儲存空間不足，請移除部分舊品。'); }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map((p, i) => `
                <div class="product-card">
                    ${isLoggedIn ? `<button class="delete-btn" onclick="deleteProduct(${i})">移除</button>` : ''}
                    <img src="${p.image}">
                    <h3>${p.name}</h3>
                    <p style="color:var(--gold)">NT$ ${Number(p.price).toLocaleString()}</p>
                    <button class="btn-action" onclick="addToCart(${i})">加入購物車</button>
                </div>
            `).join('');
        }

        function deleteProduct(i) {
            if (confirm('確定移除？')) {
                products.splice(i, 1);
                localStorage.setItem('iris_products', JSON.stringify(products));
                renderProducts();
            }
        }

        function addToCart(i) {
            cart.push(products[i]);
            localStorage.setItem('iris_cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            alert('已收藏！');
        }

        function submitOrder() {
            const n = document.getElementById('cust-name').value;
            const e = document.getElementById('cust-email').value;
            if (!n || !e) return alert('請填寫完整資訊');
            let body = `顧客姓名：${n}\r\n訂單：\r\n` + cart.map(i => `- ${i.name}`).join('\r\n');
            window.location.href = `mailto:william01.alltech@gmail.com,${e}?subject=訂單-${n}&body=${encodeURIComponent(body)}`;
            cart = []; localStorage.removeItem('iris_cart'); location.reload();
        }

        function toggleAuth() {
            if (isLoggedIn) { sessionStorage.removeItem('iris_login'); location.reload(); }
            else { const p = prompt('密碼：'); if(p==='0927') { sessionStorage.setItem('iris_login','true'); location.reload(); } }
        }

        function openCart() { document.getElementById('cart-modal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        window.onload = () => {
            if (isLoggedIn) document.getElementById('admin-panel').style.display = 'block';
            renderProducts();
            document.getElementById('cart-count').innerText = cart.length;
        };
    </script>
</body>
</html>
